# Evolution API (gratis, self-hosted) + banco PostgreSQL
# Suba com:  docker compose up -d
# Painel:    http://localhost:8080/manager
services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      # Versao do WhatsApp Web (corrige o QR Code que nao gera).
      # Se um dia parar de gerar de novo, atualize este numero.
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1023204200"
      # >>> TROQUE por uma chave secreta sua (sera o EVOLUTION_API_KEY no Recuper.ai) <<<
      AUTHENTICATION_API_KEY: troque-esta-chave-super-secreta-123
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
    depends_on:
      - postgres
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

volumes:
  evolution_instances:
  evolution_pgdata:
